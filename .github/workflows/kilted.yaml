name: Kilted

on: [push, pull_request]

jobs:
  industrial_ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: 'ros-industrial/industrial_ci@master'
        env:
          ROS_DISTRO: kilted
          ROS_REPO: main
        with:
            package-name: rosx_introspection
